<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vida Brown | Admin Dashboard</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    body { padding: 24px; } .admin-shell { max-width: 960px; margin: 0 auto; display: grid; gap: 20px; } .glass-card { padding: 24px; border-radius: 20px; } form { display: grid; gap: 12px; } input, textarea, select, button { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); color: inherit; } button { cursor: pointer; } .status { min-height: 24px; font-size: 0.95rem; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div class="glass-card">
      <h1>Admin Dashboard</h1>
      <p>Manage featured videos, tracks, and gallery images for the portfolio without touching the main site code.</p>
      <div id="login-area">
        <div style="margin-bottom:12px;">
          <label>Admin password: <input id="admin-password" type="password" placeholder="password"></label>
          <button id="login-btn" class="btn">Login</button>
          <button id="logout-btn" class="btn" style="display:none;">Logout</button>
        </div>
        <div id="login-status" class="status">Not authenticated</div>
      </div>
      <div class="status" id="status">Ready to publish new content.</div>
    </div>

    <div class="glass-card" id="video-card" style="display:none;">
      <h2>Add Video</h2>
      <form id="video-form">
        <input name="title" placeholder="Title" required />
        <input name="youtube_id" placeholder="YouTube ID" required />
        <input name="embed_url" placeholder="Embed URL" required />
        <input name="category" placeholder="Category" value="HIT OR MISS" required />
        <input name="views" placeholder="Views" value="0" />
        <input name="likes" placeholder="Likes" value="0" />
        <input name="duration" placeholder="Duration" value="0:00" />
        <input name="upload_date" placeholder="Upload date" value="Today" />
        <textarea name="description" placeholder="Description"></textarea>
        <label><input type="checkbox" name="is_featured" /> Featured video</label>
        <button class="btn btn-primary" type="submit">Save video</button>
      </form>
    </div>

    <div class="glass-card" id="track-card" style="display:none;">
      <h2>Add Track</h2>
      <form id="track-form">
        <input name="title" placeholder="Track title" required />
        <input name="artist_name" placeholder="Artist name" value="Vida Brown" required />
        <input name="track_number" placeholder="Track number" type="number" required />
        <input name="year" placeholder="Year" />
        <input name="streams" placeholder="Streams" value="0" />
        <input name="track_type" placeholder="Track type" value="Single" />
        <input name="artist_id" placeholder="Artist ID" value="1" type="number" />
        <button class="btn btn-primary" type="submit">Save track</button>
      </form>
    </div>

    <div class="glass-card" id="gallery-card" style="display:none;">
      <h2>Add Gallery Image</h2>
      <form id="gallery-form">
        <input name="url" placeholder="Image URL" required />
        <input name="alt_text" placeholder="Alt text" required />
        <input name="order" placeholder="Order" type="number" value="0" />
        <button class="btn btn-primary" type="submit">Save image</button>
      </form>
    </div>
  </div>

    <script>
    const status = document.getElementById('status');
    const setStatus = (message, isError = false) => {
      status.textContent = message;
      status.style.color = isError ? 'tomato' : 'var(--text-secondary)';
    };

    // Auth helpers
    const TOKEN_KEY = 'vida_admin_token';
    function setToken(token) { if (token) localStorage.setItem(TOKEN_KEY, token); else localStorage.removeItem(TOKEN_KEY); }
    function getToken() { return localStorage.getItem(TOKEN_KEY); }

    async function postJson(url, payload) {
      const headers = { 'Content-Type': 'application/json' };
      const token = getToken();
      if (token) headers['X-Admin-Token'] = token;
      const response = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload),
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || 'Request failed');
      return data;
    }

    async function putJson(url, payload) {
      const headers = { 'Content-Type': 'application/json' };
      const token = getToken();
      if (token) headers['X-Admin-Token'] = token;
      const response = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(payload) });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || 'Request failed');
      return data;
    }

    async function deleteReq(url) {
      const headers = {};
      const token = getToken();
      if (token) headers['X-Admin-Token'] = token;
      const response = await fetch(url, { method: 'DELETE', headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || 'Request failed');
      return data;
    }

    async function ensureAuth() {
      const token = getToken();
      if (!token) return false;
      // attempt a cheap authenticated request
      try {
        const res = await fetch('/api/videos?limit=1', { headers: { 'X-Admin-Token': token } });
        if (res.status === 401) { setToken(null); return false; }
        return true;
      } catch (e) { setToken(null); return false; }
    }

    async function showAuthenticatedUI() {
      document.getElementById('video-card').style.display = '';
      document.getElementById('track-card').style.display = '';
      document.getElementById('gallery-card').style.display = '';
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('logout-btn').style.display = '';
      document.getElementById('login-status').textContent = 'Authenticated';
      await refreshLists();
    }

    async function refreshLists() {
      try {
        const videos = await fetch('/api/videos?limit=50').then(r=>r.json());
        const tracks = await fetch('/api/music/tracks?limit=100').then(r=>r.json());
        const gallery = await fetch('/api/gallery').then(r=>r.json());
        document.getElementById('stat-videos').textContent = videos.total || videos.videos?.length || 0;
        document.getElementById('stat-tracks').textContent = tracks.total || tracks.tracks?.length || 0;
        document.getElementById('stat-gallery').textContent = gallery.length || 0;

        const vlist = document.getElementById('videos-list'); vlist.innerHTML = '';
        (videos.videos||[]).forEach(v=>{
          const el = document.createElement('div');
          el.innerHTML = `<strong>${v.title}</strong> <button data-id="${v.id}" class="edit-v">Edit</button> <button data-id="${v.id}" class="del-v">Delete</button>`;
          vlist.appendChild(el);
        });

        const tlist = document.getElementById('tracks-list'); tlist.innerHTML = '';
        (tracks.tracks||[]).forEach(t=>{
          const el = document.createElement('div');
          el.innerHTML = `<strong>${t.title}</strong> <button data-id="${t.id}" class="edit-t">Edit</button> <button data-id="${t.id}" class="del-t">Delete</button>`;
          tlist.appendChild(el);
        });

        const glist = document.getElementById('gallery-list'); glist.innerHTML = '';
        (gallery||[]).forEach(g=>{
          const el = document.createElement('div');
          el.innerHTML = `<img src="${g.url}" alt="" style="height:48px;margin-right:8px;"> <strong>${g.alt_text}</strong> <button data-id="${g.id}" class="edit-g">Edit</button> <button data-id="${g.id}" class="del-g">Delete</button>`;
          glist.appendChild(el);
        });
      } catch (e) {
        console.warn('refresh failed', e);
      }
    }

    // initialize auth state
    (async ()=>{
      const ok = await ensureAuth();
      if (ok) await showAuthenticatedUI();
    })();

    document.getElementById('video-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.target));
      payload.is_featured = event.target.is_featured.checked;
      try {
        await postJson('/api/admin/videos', payload);
        setStatus('Video saved successfully.');
        event.target.reset();
        await refreshLists();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    document.getElementById('track-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.target));
      payload.track_number = Number(payload.track_number);
      payload.artist_id = Number(payload.artist_id);
      try {
        await postJson('/api/admin/tracks', payload);
        setStatus('Track saved successfully.');
        event.target.reset();
        await refreshLists();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    document.getElementById('gallery-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.target));
      payload.order = Number(payload.order);
      try {
        await postJson('/api/admin/gallery', payload);
        setStatus('Gallery image saved successfully.');
        event.target.reset();
        await refreshLists();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    // Login handling
    document.getElementById('login-btn').addEventListener('click', async ()=>{
      const pw = document.getElementById('admin-password').value;
      try {
        const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        setToken(data.token);
        document.getElementById('login-status').textContent = 'Authenticated';
        await showAuthenticatedUI();
      } catch (e) {
        document.getElementById('login-status').textContent = 'Login failed';
        console.error(e);
      }
    });

    document.getElementById('logout-btn').addEventListener('click', ()=>{
      setToken(null);
      document.getElementById('video-card').style.display = 'none';
      document.getElementById('track-card').style.display = 'none';
      document.getElementById('gallery-card').style.display = 'none';
      document.getElementById('login-btn').style.display = '';
      document.getElementById('logout-btn').style.display = 'none';
      document.getElementById('login-status').textContent = 'Not authenticated';
    });
  </script>
</body>
</html>
